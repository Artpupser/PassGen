name: create release
on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_LIB_PATH: 'src/PassGen/PassGen.csproj'
  GITHUB_USERNAME: "Artpupser"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        runtime: [linux-x64, win-x64, osx-x64, osx-arm64]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        
      - name: "Setup .NET 10"
          uses: actions/setup-dotnet@v5
          with:
            dotnet-version: '10.0.x'
            
      - name: "Publish"
        run: |
          dotnet restore
          dotnet publish -c Release -r ${{ matrix.runtime }} --self-contained -p publish/${{ matrix.runtime }}
      
      - name: "Archive"
        run: |
          cd publish
          tar -czf ${{ matrix.runtime }}.tar.gz ${{ matrix.runtime }}
          
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.runtime }}
          path: publish/${{ matrix.runtime }}.tar.gz
  
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with: 
          path: artifacts
          
      - name: Create release
        uses: actions/action-gh-release@v3
        with: 
          name: "PassGen ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
